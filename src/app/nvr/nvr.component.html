    <div class="searchbar">
      <div class="row">
        <div class="col-lg-3 col-sm-12" style="text-align: center; align-self: center;">
          <div class="searchbox">
            <img *ngIf="searchText" src="assets/icons/x.svg" (click)="searchText = ''" style="position: absolute;">
            <input type="text" placeholder="Search for sites" [(ngModel)]="searchText" #searchinput>
            <img src="assets/icons/search.svg">
          </div>
        </div>

        <div class="col-lg-9 col-sm-12" Style="border: none; align-self: center; opacity:1">
          <div class="title1 topTitle" style="margin:0 0 0 25px;">
            <!-- <span>Support Helpdesk</span> -->
            <span class="text-white fw-bold" style="font-family: TP, sans-serif; letter-spacing: 3px;">
              {{ displaySite?.siteName }} - Alerts</span>
            <!-- <div class=" action-icons">
              <div>&nbsp;</div>
            </div> -->

            <div class="tooltiptext">Do you need Safety Escort?</div> -->
          </div>
        </div>
      </div>
    </div>
  </div>

      <div class="col-lg-3 col-sm-12 btnvisible" id="topple" #topple>

            <!-- <img src="assets/icons/eye.svg" style="width: 20px;" alt="ivisUSA" *ngIf="navActive != i">

            <img src="assets/icons/eye-white.svg" style="width: 15px; margin-right: 10px;" alt="ivisUSA"

            <div class="label">{{ site?.siteName }} </div>
            <div class="accordionArrow"><img src="assets/icons/forward_arrow.svg" width="20" alt="drop"></div>
          </div>
        </div>
        <br>
      </div>


      <div class="col-lg-9 col-sm-12">
        <!-- <span class="text-white fw-bold" style="font-family: TP, sans-serif; letter-spacing: 3px;">{{ currentSite?.siteName }}</span>

        <div class="table-resp extra w-100">
          <table class="table table-hover" id="mytable">
            <thead style="position: sticky; top: 0; z-index: 1;">
              <tr class="form1">
                <th scope="col">
                <span>Site Id</span>
                <img (click)="sort('siteId')" class="pointer ms-1" src="assets/icons/sorticon.svg"
                    width="15px">
                </th>
                <th scope="col">
                <span>Site Name</span>
                <img (click)="sort('eventFromTime')" class="pointer ms-1" src="assets/icons/sorticon.svg"
                    width="15px">
                </th>
                <th scope="col">
                  <span>NVR Serial No</span>
                  <img (click)="sort('nvrSno')" class="pointer ms-1" src="assets/icons/sorticon.svg"
                    width="15px">
                </th>
                <th scope="col">
                  <span>User Id</span>
                  <img (click)="sort('userId')" class="pointer ms-1" src="assets/icons/sorticon.svg" width="15px">
                </th>
                <th scope="col">
                  <span>Password</span>
                  <img (click)="sort('password')" class="pointer ms-1" src="assets/icons/sorticon.svg" width="15px">
                </th>
                <th scope="col">
                  <span>Status</span>
                  <img (click)="sort('status')" class="pointer ms-1" src="assets/icons/sorticon.svg" width="15px">
                </th>
                <th scope="col" *ngIf="isAdmin">
                  <span>Actions</span>
                </th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let item of newEventData; let i=index"
                [style.background-color]="tableIndex == i ? '#ababab': ''">
                <td>{{item?.siteId}}</td>
                <td>{{item?.remarks}}</td>
                <td>{{item?.nvrSno}}</td>
                <td>{{item?.userId}}</td>
                <td>{{item?.password}}</td>
                <td>
                  <p [style.color]="item?.status == 'Active' ? 'green' : 'red'">{{item?.status}}</p>
                </td>
                <td *ngIf="isAdmin">
                    <img src="assets/icons/edit.svg" class="pointer" alt="" width="18" (click)="openPlayModel(item, i)" matTooltip="Edit">
                </td>
              </tr>
            </tbody>
          </table>
          
          <div class="d-flex align-items-center justify-content-center" style="height: 70%;"
            *ngIf="newEventData.length == 0">
            <h2 class="text-secondary" style="font-family: PS, sans-serif;">NO DATA</h2>
          </div>
        </div>

</div>

<div class="new-dialog" id="playModel">
  <div class="dialog-header">
    <p>Edit NVR</p>

    <div class="d-flex align-items-center">
      <p><img src="assets/icons/close.svg" width="20" class="pointer ms-2" #close (click)="closeModel('playModel')" title="Download" alt=""></p>
    </div>
  </div>

  <div class="dialog-content" style="position: relative;" *ngIf="currentTileItem">
    <div class="row m-0">
        <!-- <div class="col-md-6 mb-3">
          <span class="label">Site</span>
          <select class="form-select" [(ngModel)]="currentItem.siteId" disabled>
            <option value="" disabled>Select Site</option>
            <option *ngFor="let site of siteIdToNav" [value]="site?.siteId">{{site?.siteName}}</option>
          </select>
        </div> -->
        <div class="col-md-6 mb-3">
            <span class="label">siteId</span>
            <input type="text" class="form-control" placeholder="siteId" [(ngModel)]="currentTileItem.siteId" disabled>
          </div>
        <div class="col-md-6 mb-3">
            <span class="label">nvrSno</span>
            <input type="text" class="form-control" placeholder="nvrSno" [(ngModel)]="currentTileItem.nvrSno">
          </div>
          <div class="col-md-6 mb-3">
            <span class="label">userId</span>
            <input type="text" class="form-control" placeholder="userId" [(ngModel)]="currentTileItem.userId">
          </div>
          <div class="col-md-6 mb-3">
            <span class="label">password</span>
            <input type="text" class="form-control" placeholder="password" [(ngModel)]="currentTileItem.password">
          </div>
          <!-- <div class="col-md-6 mb-3">
            <span class="label">status</span>
            <input type="text" class="form-control" placeholder="status" [(ngModel)]="currentTileItem.status">
          </div> -->
          <div class="col-md-6 mb-3">
            <span class="label">status</span>
            <select class="form-select" [(ngModel)]="currentTileItem.status">
              <!-- <option value="" disabled>Select Site</option> -->
              <option *ngFor="let item of nvrStatus" [value]="item">{{item}}</option>
            </select>
          </div>
        <div class="col-md-6 mb-3">
          <span class="label">Remarks</span>
          <input type="text" class="form-control" placeholder="Remarks" [(ngModel)]="currentTileItem.remarks">
        </div>
      </div>
  </div>

  <div class="text-center">

      <button class=" w-25 my-2 py-2" (click)="updateIncidents()">Submit</button>
  </div>
</div>
