<div class="login-container">
  <div class="left-panel">
    <div class="overlay"></div>
  </div>

  <div class="right-panel">
    <div class="login-box">
      <img src="assets/themes/verifai-logo.png" alt="VERIFAI LIVE" class="logo" />
      <h3>Welcome to sign in</h3>

      <form [formGroup]="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter" formControlName="userName"/>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Password here" formControlName="password"/>
        </div>

        <div class="options">
          <label><input type="checkbox" (change)="showPassword=!showPassword"/> Show Password</label>

        </div>

        <button type="submit" class="login-btn" (click)="login()">LOG IN

        </button>
      </form>
    </div>
  </div>
</div>


<ng-container *ngIf="showLoader">
  <app-loader></app-loader>
</ng-container>
