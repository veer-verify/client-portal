<app-loader *ngIf="showLoader"></app-loader>
<app-alert></app-alert>
<!-- <app-chatpopup drag></app-chatpopup> -->

<div class="row formModal">
  <div class="col-lg-6 col-4"></div>
  <div class="col-lg-6 col-8 add-form" id="camera" @inOutPaneAnimation>

    <!-- title -->
    <div class="d-flex justify-content-start py-2">
      <a class="pointer" (click)="closeForm()" style="position: relative; left: -27px;">
        <img src="assets/icons/close.svg" width="35" class="me-2">
      </a>
      <span class="form-heading">create advertisement</span>
    </div>
    <!-- /title -->

    <!-- form -->
    <div>
      <form autocomplete="off" [formGroup]="addAssetForm" (ngSubmit)="addNewAsset()">
        <div class="row">
          <div class="col-lg-6 col-md-6 mb-2">
            <label class="label">Device</label>
            <select class="form-select" formControlName="deviceId" [(ngModel)]="assetData.asset.deviceId" (focus)="getDevices()">
              <option value="" disabled selected>Select Device</option>
              <option *ngFor="let item of deviceData" [value]="item?.deviceId">{{ item?.deviceDescription }}</option>
            </select>
            <span class="error-msg" *ngIf="addAssetForm.controls['deviceId'].invalid && submit">*Required</span>
          </div>
          <!-- <div class="col-lg-6 col-md-6 mb-2">
            <select [className]="addAssetForm.controls['deviceModeId'].valid || !submit ? 'input-valid' : 'input-invalid'" formControlName="deviceModeId" [(ngModel)]="assetData.asset.deviceModeId">
              <option value="" disabled>Device mode</option>
              <option [value]="1">Continuous Advertisements</option>
            </select>
          </div> -->
          <div class="col-lg-6 col-md-6">
            <label class="label">File Name</label>
            <input
              type="text"
              placeholder="Ad's Name"
              class="form-control"
              formControlName="name"
              [(ngModel)]="assetData.asset.name"
            >
            <!-- <p class="hint-txt mb-2">eg: Coca-Cola.mp4</p> -->
            <span class="error-msg" *ngIf="addAssetForm.controls['name'].invalid && submit">*Required</span>
          </div>

          <div class="col-lg-12 mb-3">
            <label class="label">Select File</label>
            <input class="form-control" type="file" (change)="onFileSelected($event)" formControlName="file"  [(ngModel)]="assetData.file">
            <span class="error-msg" *ngIf="addAssetForm.controls['file'].invalid && submit">*Required</span>
          </div>

          <div class="col-lg-12 label">Time&nbsp;</div>
          <div class="col-lg-12 row mb-3">
            <div class="row">
              <div class="col-xl-1" style="min-width: 100px;">
                <input class="form-check-input" type="radio" [value]="3" id="all" formControlName="timeId" [(ngModel)]="assetData.nameParams.timeId">
                <label class="form-check-label ms-1" for="all">
                  All
                </label>
              </div>

              <div class="col-xl-1" style="min-width: 150px;">
                <input class="form-check-input" type="radio" [value]="1" id="am" formControlName="timeId" [(ngModel)]="assetData.nameParams.timeId">
                <label class="form-check-label ms-1 d-inline-flex" for="am">
                  AM <span class="hint-txt">(00:00 - 12:00)</span>
                </label>
              </div>

              <div class="col-xl-1" style="min-width: 150px;">
                <input class="form-check-input" type="radio" [value]="2" id="pm" formControlName="timeId" [(ngModel)]="assetData.nameParams.timeId">
                <label class="form-check-label ms-1 d-inline-flex" for="pm">
                  PM <span class="hint-txt">(12:01 - 23:59)</span>
                </label>
              </div>
            </div>
          </div>


          <div class="col-lg-2 label">Temperature&nbsp;</div>

          <div class="col-lg-12 row mb-3">
            <div class="row">
              <div class="col-xl-1" style="min-width: 100px;">
                <input class="form-check-input" type="radio" [value]="4" id="all" formControlName="tempId" [(ngModel)]="assetData.nameParams.tempId">
                <label class="form-check-label ms-1" for="all">
                  All
                </label>
              </div>

              <div class="col-xl-1" style="min-width: 150px;">
                <input class="form-check-input" type="radio" [value]="1" id="first" formControlName="tempId" [(ngModel)]="assetData.nameParams.tempId">
                <label class="form-check-label ms-1 d-inline-flex" for="first">
                  <span>-10 to 20</span>
                  <span class="hint-txt">(Cold)</span>
                </label>
              </div>

              <div class="col-xl-1" style="min-width: 150px;">
                <input class="form-check-input" type="radio" [value]="2" id="second" formControlName="tempId" [(ngModel)]="assetData.nameParams.tempId">
                <label class="form-check-label ms-1 d-inline-flex" for="second">
                  21 to 40 <span class="hint-txt">(Nrml)</span>
                </label>
              </div>

              <div class="col-xl-2" style="min-width: 120px;">
                <input class="form-check-input" type="radio" [value]="3" id="third" formControlName="tempId" [(ngModel)]="assetData.nameParams.tempId">
                <label class="form-check-label ms-1 d-inline-flex" for="third">
                  >40 <span class="hint-txt">(Hot)</span>
                </label>
              </div>
            </div>
          </div>

          <div class="col-lg-12 mb-2">
            <div class="col-lg-6 col-md-6 d-flex justify-content-start align-items-center my-2">
              <p class="m-0">Object(Persion/Vehicle)</p>
              <div class="on-off-toggle ms-4">
                <input class="on-off-toggle__input" type="checkbox" id="object" formControlName="object" [(ngModel)]="object" (click)="toggleShowOnOff()"
                [ngModel]="object == 1 ? true : false" (ngModelChange)="object = $event ? 1 : 0">
                <label for="object" class="on-off-toggle__slider"></label>
              </div>
            </div>
          </div>

          <div class="col-lg-6 mb-3" *ngIf="personshow">
            <div class="row">
              <div class="col-xl-1" style="min-width: 150px;">
                <input class="form-check-input" type="radio" [value]="0" id="person" formControlName="person_vehicle" [(ngModel)]="person_vehicle">
                <label class="form-check-label ms-1 d-inline-flex" for="person">
                  Person
                </label>
              </div>

              <div class="col-xl-1" style="min-width: 150px;">
                <input class="form-check-input" type="radio" [value]="1" id="vehicle" formControlName="person_vehicle" [(ngModel)]="person_vehicle">
                <label class="form-check-label ms-1 d-inline-flex" for="vehicle">
                  Vehicle
                </label>
              </div>
            </div>
          </div>

          <div *ngIf="personshow" class="col-lg-6 mb-3">
            <div *ngIf="person_vehicle == 0">
              <input
                type="number"
                placeholder="Count"
                class="form-control"
                formControlName="persons"
                [(ngModel)]="assetData.nameParams.persons"
              >
            </div>

            <div *ngIf="person_vehicle == 1">
              <input
                type="number"
                placeholder="Count"
                class="form-control"
                formControlName="vehicles"
                [(ngModel)]="assetData.nameParams.vehicles"
              >
            </div>
          </div>

          <!-- <div class="col-lg-6 col-md-6">
            <input type="text" placeholder="Ad Description">
            <span class="hint-txt">eg: Kitchen roo, Hall</span>
          </div> -->

          <div class="col-lg-6 col-md-6 mb-2">
            <label class="label">From Date</label>
            <input type="date" name="session-date" class="form-control w-100 py-2" formControlName="fromDate" [(ngModel)]="assetData.asset.fromDate">
          </div>

          <div class="col-lg-6 col-md-6 mb-2">
            <label class="label">To Date</label>
            <input type="date" name="session-date" class="form-control w-100 py-2" formControlName="toDate" [(ngModel)]="assetData.asset.toDate" (change)="onDateChange()">
          </div>

          <!-- <div class="col-lg-12 col-md-6 mb-2">
            <div [className]="addAssetForm.controls['file'].valid || !submit ? 'valid' : 'invalid'">
              <div class="text-white">Drag and drop or <a (click)="fileInput.click()" class="pointer">Browse</a> your file</div>
            </div>

            <div class="bg-white">
              <input hidden (change)="onFileSelected($event)" #fileInput type="file" formControlName="file"  [(ngModel)]="assetData.file">
              <div class="file-name" *ngIf="selectedFile">
                <div class="d-flex align-items-center justify-content-between mt-2">
                  <span>
                    {{ selectedFile?.name }}
                  </span>
                  <a *ngIf="selectedFile" class="pointer text-end" (click)="deleteFile()">
                    <img style="color: #bdb8b8;" src="assets/delete.svg" width="18">
                  </a>
                </div>
              </div>
            </div>
          </div> -->

          <div class="col-lg-12">
            <p style="font-size: 14px;">
              <span style="font-weight: 500;">Note:</span>&nbsp;For Special Cases, Please Contact
              <a href="https://www.ivisecurity.com/contact" class="text-primary" target="_blank">{{'support@ivisecurity.com'}}</a>
            </p>
          </div>

          <div class="text-center my-3">
            <button class="btn add-btn">ADD</button>
          </div>
        </div>
      </form>

    </div>
    <!-- /form -->
  </div>
</div>
