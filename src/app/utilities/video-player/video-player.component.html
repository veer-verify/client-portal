<div class="video-player" [style.height]="gridClicked === 1 ? '80vh' : gridClicked === 2 ? '60vh' : gridClicked === 3 ? '40vh' : '30vh'">
    <div class="eye-logo">
        <img src="assets/gif/loading-gif.gif" alt="" width="200" *ngIf="showLoader">
    </div>
    <video #video width="100%" height="100%"></video>
    <canvas #canvas width="1280" height="720" class="d-none"></canvas>
</div>
